<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="warmGlow" cx="50%" cy="68%" r="44%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#05070b"/>

  <!-- Warm ambient glow behind the mark -->
  <ellipse cx="50" cy="65" rx="42" ry="24" fill="url(#warmGlow)"/>

  <!-- AdSolem sun mark — original paths from SunMark component,
       scaled 0.533x and translated to center in 100×100 square -->
  <g transform="translate(10, 24) scale(0.533)"
     fill="none"
     stroke="#c9a84c"
     stroke-width="3"
     stroke-linecap="round"
     filter="url(#glow)">
    <!-- Horizon arc -->
    <path d="M17 70C36 63 55 59 75 59C95 59 114 63 133 70"/>
    <!-- Sun semicircle -->
    <path d="M52 58C52 45.3 62.3 35 75 35C87.7 35 98 45.3 98 58"/>
    <!-- Top ray -->
    <path d="M75 6V28"/>
    <!-- Upper diagonal rays -->
    <path d="M48 15L60 35"/>
    <path d="M102 15L90 35"/>
    <!-- Mid diagonal rays -->
    <path d="M27 35L48 47"/>
    <path d="M123 35L102 47"/>
    <!-- Horizontal rays -->
    <path d="M16 56H40"/>
    <path d="M110 56H134"/>
  </g>
</svg>
